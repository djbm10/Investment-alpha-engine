clearance:
  baseline_run_id: "b440fc17-3c9c-46a3-840e-d4837b52f9d9"
  summary: "Phase 4 starts from the cleared Phase 2 baseline because the Phase 3 TDA overlay was deferred."

price_source: yfinance
tickers:
  - XLK
  - XLE
  - XLV
  - XLP
  - XLU
  - XLY
  - XLRE
  - XLB

start_date: "2020-01-01"
end_date: null

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  log_dir: logs
  pipeline_log_file: logs/phase1_pipeline.jsonl
  postgres_log_file: logs/postgres.log
  cache_dir: data/.cache/yfinance
  postgres_dir: data/postgres/phase1

database:
  host: 127.0.0.1
  port: 55432
  user: postgres
  admin_database: postgres
  database_name: investment_alpha_engine
  require_timescaledb: false

validation:
  max_abs_daily_return: 0.5
  max_missing_business_days: 3
  adj_close_close_tolerance: 0.001

schedule:
  timezone: America/New_York
  hour: 16
  minute: 15

phase2:
  lookback_window: 60
  diffusion_alpha: 0.05
  diffusion_steps: 3
  sigma_scale: 1.0
  min_weight: 0.1
  zscore_lookback: 75
  signal_threshold: 2.8
  tier2_enabled: false
  tier2_fraction: 0.75
  tier2_size_fraction: 0.5
  full_size_zscore: 3.0
  max_position_size: 0.20
  risk_budget_utilization: 0.3
  max_drawdown_limit: 0.20
  enforce_dollar_neutral: false
  corr_floor: 0.30
  density_floor: 0.30
  node_corr_floor: 0.20
  max_holding_days: 9
  stop_loss: 0.05
  min_training_months: 12
  annualization_days: 252
  commission_bps: 0.0
  bid_ask_bps: 2.0
  market_impact_bps: 2.0
  slippage_bps: 1.0

phase2_sweep:
  risk_budget_utilizations: [0.3, 0.5, 0.7]
  corr_floors: [0.25, 0.30, 0.35]
  density_floors: [0.30, 0.40, 0.50]

phase4:
  tcn_enabled: true
  hidden_channels: 32
  n_blocks: 3
  dropout: 0.2
  n_ensemble: 3
  learning_rate: 0.001
  weight_decay: 0.0001
  max_epochs: 100
  patience: 10
  batch_size: 32
  sequence_length: 20
  validation_fraction: 0.15
  reversion_confirm_threshold: 0.5
